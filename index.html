<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LUMIRE ERP - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>LUMIRE ERP</h1>
            <h2>Iniciar Sesión</h2>

            <div class="input-group">
                <label>Empresa</label>
                <select id="empresaSelect">
                    <option value="1">Cargando empresas...</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Seleccionar Usuario</label>
                <select id="usuarioSelect">
                    <option value="">-- Cargando usuarios... --</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Email (o selecciona arriba)</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>
            
            <div class="input-group">
                <label>Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Ingresa tu contraseña">
                    <button type="button" id="togglePassword" class="toggle-password">👁️</button>
                </div>
            </div>
            
            <div class="input-group checkbox-group">
                <input type="checkbox" id="rememberCheckbox">
                <label for="rememberCheckbox">Recordar usuario</label>
            </div>

            <div class="input-group password-wrapper">
                <input type="password" id="password" placeholder="Ingresa tu contraseña">
                <button type="button" class="toggle-password" id="togglePassword">👁️</button>
            </div>
            
            <button id="loginBtn">Ingresar</button>
            
            <div id="errorMsg" class="error"></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
