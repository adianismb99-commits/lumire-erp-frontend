<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LUMIRE ERP - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>LUMIRE <span>ERP</span></h1>
            <p class="subtitle">Gestiona tu negocio con inteligencia</p>
            
            <div class="input-group">
                <label>Empresa</label>
                <select id="empresaSelect">
                    <option value="1">Cargando empresas...</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Usuario</label>
                <select id="usuarioSelect">
                    <option value="">-- Cargando usuarios... --</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>
            
            <div class="input-group">
                <label>Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Ingresa tu contraseña">
                    <button type="button" class="toggle-btn" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <!-- SOLO Recordar usuario -->
            <div class="checkbox-group" style="margin-bottom: 8px;">
                <input type="checkbox" id="rememberCheckbox">
                <label for="rememberCheckbox">Recordar usuario</label>
            </div>
            
            <button class="btn-primary" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
            
            <div id="errorMsg" class="error"></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
