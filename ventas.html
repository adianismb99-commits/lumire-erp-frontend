<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIRE ERP - Punto de Venta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h2>LUMIRE ERP</h2>
            <nav>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="ventas.html">💰 Punto de Venta</a>
                <a href="productos.html">📦 Productos</a>
                <a href="ventas.html#historial">📋 Historial de Ventas</a>
                <a href="#" id="logoutBtn" style="background:#e53e3e;">🚪 Salir</a>
            </nav>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <h1>Punto de Venta</h1>
            </div>
            <div class="ventas-panel">
                <div class="productos-lista">
                    <h3>Productos</h3>
                    <div id="productosContainer"></div>
                </div>
                <div class="carrito">
                    <h3>Carrito</h3>
                    <div id="carritoItems"></div>
                    <div class="carrito-total">
                        Total: <span id="carritoTotal">$0</span>
                    </div>
                    <button id="pagarBtn" class="pagar-btn">💵 Cobrar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
