<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUMIRE ERP - Punto de Venta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================
           ESTILOS DE CAJA REGISTRADORA - MÓVIL
           ============================================ */
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .pos-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            height: calc(100vh - 130px);
            min-height: 500px;
            overflow: hidden;
        }

        /* Panel de productos - más compacto en móvil */
        .productos-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px;
            overflow-y: auto;
            max-height: 180px;
            flex-shrink: 0;
        }
        .productos-panel h3 {
            color: var(--text-secondary);
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 6px;
        }
        .producto-item {
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-touch-callout: none;
            user-select: none;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .producto-item:active {
            transform: scale(0.92);
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.1);
        }
        .producto-item .prod-nombre {
            font-size: 0.65em;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-word;
            line-height: 1.2;
        }
        .producto-item .prod-precio {
            font-size: 0.7em;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-top: 2px;
        }

        /* Panel de caja - ocupa el resto */
        .caja-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* Carrito - con scroll automático */
        .carrito-wrapper {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            scroll-behavior: smooth;
        }
        .carrito-wrapper::-webkit-scrollbar {
            width: 3px;
        }
        .carrito-wrapper::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .carrito-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            margin-bottom: 6px;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 5;
        }
        .carrito-header h3 {
            color: var(--text-secondary);
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .carrito-items {
            min-height: 40px;
            max-height: 100px;
            overflow-y: auto;
        }
        .carrito-items::-webkit-scrollbar {
            width: 2px;
        }
        .carrito-items::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        .carrito-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75em;
        }
        .carrito-item .item-info {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }
        .carrito-item .item-cantidad {
            background: var(--bg-primary);
            padding: 0 8px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.75em;
            min-width: 20px;
            text-align: center;
        }
        .carrito-item .item-nombre {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .carrito-item .item-precio {
            font-weight: 600;
            color: var(--accent-cyan);
            font-size: 0.8em;
            margin-left: 4px;
            white-space: nowrap;
        }
        .carrito-item .btn-eliminar {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7em;
            padding: 4px 6px;
            transition: color 0.2s;
        }
        .carrito-item .btn-eliminar:active {
            color: var(--danger);
        }

        .carrito-total {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-top: 2px solid var(--border-color);
            font-size: 0.9em;
            font-weight: 700;
            position: sticky;
            bottom: 0;
            background: var(--bg-card);
            z-index: 5;
        }
        .carrito-total .total-label {
            color: var(--text-secondary);
        }
        .carrito-total .total-monto {
            color: var(--accent-cyan);
        }

        /* Panel de pago - siempre visible abajo */
        .pago-panel {
            border-top: 1px solid var(--border-color);
            padding-top: 8px;
            margin-top: auto;
            flex-shrink: 0;
        }

        /* Teclado numérico - MÓVIL AMIGABLE */
        .teclado-numerico {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin: 4px 0 8px 0;
        }
        .teclado-numerico .btn-billete {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px 2px;
            font-weight: 700;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
            -webkit-touch-callout: none;
            user-select: none;
            min-height: 44px;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .teclado-numerico .btn-billete:active {
            transform: scale(0.90);
            background: var(--accent-purple);
            color: white;
            border-color: var(--accent-purple);
        }
        .teclado-numerico .btn-billete .sub-label {
            display: block;
            font-weight: 400;
            font-size: 0.5em;
            color: var(--text-muted);
            line-height: 1.2;
        }
        .teclado-numerico .btn-billete:active .sub-label {
            color: rgba(255,255,255,0.7);
        }
        .teclado-numerico .btn-limpiar {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
            border-color: var(--danger);
        }
        .teclado-numerico .btn-limpiar:active {
            background: var(--danger);
            color: white;
        }

        /* Campo de pago y vuelto - visible y editable */
        .pago-vuelto {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .pago-vuelto .campo {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 6px 8px;
            text-align: center;
        }
        .pago-vuelto .campo .label {
            color: var(--text-muted);
            font-size: 0.55em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }
        .pago-vuelto .campo .valor {
            font-size: 1.3em;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            display: block;
            line-height: 1.3;
        }
        .pago-vuelto .campo .valor.recibido {
            color: var(--text-primary);
        }
        .pago-vuelto .campo .valor.vuelto {
            color: var(--success);
        }
        .pago-vuelto .campo .valor.vuelto.negativo {
            color: var(--danger);
        }

        /* Input de pago - VISIBLE Y EDITABLE */
        #pagoEfectivo {
            width: 100%;
            padding: 6px 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            text-align: center;
            font-size: 1.1em;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            margin-top: 2px;
        }
        #pagoEfectivo:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        /* Botón cobrar - MÓVIL AMIGABLE */
        .btn-cobrar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--success), #16a34a);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 48px;
            touch-action: manipulation;
        }
        .btn-cobrar:active {
            transform: scale(0.96);
        }
        .btn-cobrar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Estado de caja */
        #cajaInfo {
            font-size: 0.7em;
        }

        /* ============================================
           RESPONSIVE - MÓVIL
           ============================================ */
        @media (max-width: 480px) {
            .pos-container {
                height: calc(100vh - 110px);
                gap: 8px;
            }
            .productos-panel {
                max-height: 130px;
                padding: 8px;
            }
            .productos-grid {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
                gap: 4px;
            }
            .producto-item {
                padding: 6px 2px;
                min-height: 44px;
            }
            .producto-item .prod-nombre {
                font-size: 0.55em;
            }
            .producto-item .prod-precio {
                font-size: 0.6em;
            }
            .caja-panel {
                padding: 8px;
            }
            .teclado-numerico {
                gap: 3px;
            }
            .teclado-numerico .btn-billete {
                padding: 8px 2px;
                font-size: 0.7em;
                min-height: 38px;
            }
            .teclado-numerico .btn-billete .sub-label {
                font-size: 0.45em;
            }
            .pago-vuelto .campo {
                padding: 4px 6px;
            }
            .pago-vuelto .campo .valor {
                font-size: 1.1em;
            }
            .carrito-items {
                max-height: 70px;
            }
            .carrito-item {
                font-size: 0.65em;
                padding: 3px 0;
            }
            .btn-cobrar {
                padding: 10px;
                font-size: 0.85em;
                min-height: 40px;
            }
            .carrito-total {
                font-size: 0.8em;
                padding: 4px 0;
            }
            .carrito-header h3 {
                font-size: 0.65em;
            }
            #pagoEfectivo {
                font-size: 0.95em;
                padding: 4px 6px;
            }
        }

        @media (max-width: 380px) {
            .productos-grid {
                grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            }
            .teclado-numerico {
                grid-template-columns: repeat(4, 1fr);
            }
            .producto-item .prod-nombre {
                font-size: 0.5em;
            }
        }

        @media (min-width: 769px) {
            .pos-container {
                grid-template-columns: 1fr 420px;
                height: calc(100vh - 180px);
            }
            .productos-panel {
                max-height: none;
            }
            .productos-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            .carrito-items {
                max-height: 200px;
            }
            .producto-item {
                min-height: 70px;
            }
            .producto-item .prod-nombre {
                font-size: 0.8em;
            }
            .producto-item .prod-precio {
                font-size: 0.9em;
            }
        }

        /* Animación de feedback al tocar */
        .btn-billete, .producto-item, .btn-cobrar {
            transition: transform 0.1s;
        }

        /* Scroll suave */
        .carrito-wrapper {
            scroll-behavior: smooth;
        }

        /* Badge de cantidad en carrito */
        .carrito-count-badge {
            background: var(--accent-purple);
            color: white;
            border-radius: 50%;
            padding: 0 6px;
            font-size: 0.6em;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">LUMIRE <span>ERP</span></div>
            <nav>
                <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Panel</a>
                <a href="ventas.html" class="active"><i class="fas fa-cash-register"></i> Punto Venta</a>
                <a href="productos.html"><i class="fas fa-boxes"></i> Productos</a>
                <a href="recetas.html"><i class="fas fa-utensils"></i> Recetas</a>
                <a href="inventario.html"><i class="fas fa-warehouse"></i> Inventario</a>
                <a href="nomina.html"><i class="fas fa-coins"></i> Nómina</a>
                <a href="cierre_caja.html"><i class="fas fa-cash-register"></i> Cierre Caja</a>
                <a href="usuarios.html"><i class="fas fa-users"></i> Usuarios</a>
                <a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a>
                <a href="#" id="logoutBtn" class="logout"><i class="fas fa-sign-out-alt"></i> Salir</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 style="font-size: 1.1em;"><i class="fas fa-cash-register" style="color: var(--accent-cyan);"></i> Punto de Venta</h1>
                <div class="user-info" style="gap: 6px;">
                    <span id="cajaInfo" style="color: var(--text-muted); font-size: 0.65em;">Caja: Cerrada</span>
                    <div class="avatar" style="width: 30px; height: 30px; font-size: 0.7em;">A</div>
                </div>
            </div>

            <!-- ============================================ -->
            <!-- CONTENEDOR PRINCIPAL POS                      -->
            <!-- ============================================ -->
            <div class="pos-container">

                <!-- Panel izquierdo: Productos -->
                <div class="productos-panel">
                    <h3><i class="fas fa-box" style="color: var(--accent-purple);"></i> Productos</h3>
                    <div class="productos-grid" id="productosContainer">
                        <!-- Productos cargados dinámicamente -->
                        <div style="color: var(--text-muted); text-align: center; grid-column: 1 / -1; font-size: 0.7em; padding: 8px 0;">
                            <i class="fas fa-spinner fa-spin"></i> Cargando...
                        </div>
                    </div>
                </div>

                <!-- Panel derecho: Caja Registradora -->
                <div class="caja-panel">
                    <!-- Carrito con scroll automático -->
                    <div class="carrito-wrapper" id="carritoWrapper">
                        <div class="carrito-header">
                            <h3><i class="fas fa-shopping-cart" style="color: var(--warning);"></i> Carrito <span id="carritoCount" class="carrito-count-badge">0</span></h3>
                            <button onclick="vaciarCarrito()" style="background: none; border: none; color: var(--text-muted); font-size: 0.7em; cursor: pointer; padding: 4px 8px;">
                                <i class="fas fa-trash"></i> Vaciar
                            </button>
                        </div>
                        <div class="carrito-items" id="carritoItems">
                            <div style="color: var(--text-muted); text-align: center; padding: 12px 0; font-size: 0.75em;">
                                <i class="fas fa-cart-plus" style="font-size: 1.5em; display: block; margin-bottom: 4px; opacity: 0.3;"></i>
                                Agrega productos
                            </div>
                        </div>
                        <div class="carrito-total">
                            <span class="total-label">Total</span>
                            <span class="total-monto" id="carritoTotal">$0.00</span>
                        </div>
                    </div>

                    <!-- Panel de pago - SIEMPRE VISIBLE -->
                    <div class="pago-panel">
                        <!-- Teclado numérico de billetes -->
                        <div class="teclado-numerico">
                            <button class="btn-billete" data-monto="1000" onclick="agregarMontoPago(1000)">$1000</button>
                            <button class="btn-billete" data-monto="500" onclick="agregarMontoPago(500)">$500</button>
                            <button class="btn-billete" data-monto="200" onclick="agregarMontoPago(200)">$200</button>
                            <button class="btn-billete" data-monto="100" onclick="agregarMontoPago(100)">$100</button>
                            <button class="btn-billete" data-monto="50" onclick="agregarMontoPago(50)">$50</button>
                            <button class="btn-billete" data-monto="20" onclick="agregarMontoPago(20)">$20</button>
                            <button class="btn-billete" data-monto="10" onclick="agregarMontoPago(10)">$10</button>
                            <button class="btn-billete" data-monto="5" onclick="agregarMontoPago(5)">$5</button>
                            <button class="btn-billete" data-monto="1" onclick="agregarMontoPago(1)">$1</button>
                            <button class="btn-billete btn-limpiar" onclick="limpiarPago()">
                                <i class="fas fa-eraser"></i>
                                <span class="sub-label">Limpiar</span>
                            </button>
                        </div>

                        <!-- Campo recibido y vuelto - CON INPUT VISIBLE -->
                        <div class="pago-vuelto">
                            <div class="campo">
                                <span class="label">Recibido</span>
                                <span class="valor recibido" id="pagoDisplay">$0.00</span>
                                <input type="number" id="pagoEfectivo" placeholder="Escribe el monto" step="0.01" min="0">
                            </div>
                            <div class="campo">
                                <span class="label">Vuelto</span>
                                <span class="valor vuelto" id="vueltoCliente">$0.00</span>
                            </div>
                        </div>

                        <!-- Botón cobrar -->
                        <button class="btn-cobrar" id="pagarBtn">
                            <i class="fas fa-credit-card"></i> Cobrar
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ============================================ -->
    <!-- SCRIPTS                                       -->
    <!-- ============================================ -->
    <script src="app.js"></script>
    <script>
        // ============================================
        // FUNCIONES DE CAJA REGISTRADORA VIRTUAL
        // ============================================

        // 1. Agregar monto de billete al campo de pago
        function agregarMontoPago(monto) {
            const pagoInput = document.getElementById('pagoEfectivo');
            const pagoDisplay = document.getElementById('pagoDisplay');
            if (pagoInput) {
                let valorActual = parseFloat(pagoInput.value) || 0;
                pagoInput.value = (valorActual + monto).toFixed(2);
                pagoDisplay.textContent = `$${(valorActual + monto).toFixed(2)}`;
                calcularVuelto();
                pagoInput.focus();
                pagoInput.select();
            }
        }

        // 2. Limpiar el campo de pago
        function limpiarPago() {
            const pagoInput = document.getElementById('pagoEfectivo');
            const pagoDisplay = document.getElementById('pagoDisplay');
            if (pagoInput) {
                pagoInput.value = '';
                pagoDisplay.textContent = '$0.00';
            }
            document.getElementById('vueltoCliente').textContent = '$0.00';
            document.getElementById('vueltoCliente').className = 'valor vuelto';
            document.getElementById('pagoEfectivo').focus();
        }

        // 3. Calcular el vuelto automáticamente
        function calcularVuelto() {
            const pagoInput = document.getElementById('pagoEfectivo');
            const pagoDisplay = document.getElementById('pagoDisplay');
            const vueltoSpan = document.getElementById('vueltoCliente');

            // Obtener el total del carrito
            let totalCarrito = 0;
            if (typeof carrito !== 'undefined' && carrito.length > 0) {
                totalCarrito = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            }

            const pago = parseFloat(pagoInput.value) || 0;
            const vuelto = pago - totalCarrito;

            // Actualizar display
            if (pagoInput.value) {
                pagoDisplay.textContent = `$${pago.toFixed(2)}`;
            } else {
                pagoDisplay.textContent = '$0.00';
            }

            if (vuelto >= 0) {
                vueltoSpan.textContent = `$${vuelto.toFixed(2)}`;
                vueltoSpan.className = 'valor vuelto';
            } else {
                vueltoSpan.textContent = `$${vuelto.toFixed(2)}`;
                vueltoSpan.className = 'valor vuelto negativo';
            }
        }

        // 4. Vaciar carrito
        function vaciarCarrito() {
            if (typeof carrito !== 'undefined') {
                if (carrito.length === 0) return;
                if (!confirm('¿Vaciar todo el carrito?')) return;
                carrito = [];
                if (typeof actualizarCarrito === 'function') {
                    actualizarCarrito();
                }
                limpiarPago();
            }
        }

        // 5. SCROLL AUTOMÁTICO AL AGREGAR PRODUCTO (se llama desde app.js)
        function scrollAlCarrito() {
            const wrapper = document.getElementById('carritoWrapper');
            if (wrapper) {
                // En móvil, scrollear al carrito
                if (window.innerWidth <= 768) {
                    wrapper.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }
                // También scrollear dentro del wrapper al final
                setTimeout(() => {
                    wrapper.scrollTop = wrapper.scrollHeight;
                }, 100);
            }
        }

        // 6. Sobrescribir agregarAlCarrito para incluir scroll
        const originalAgregarAlCarrito = window.agregarAlCarrito;
        if (typeof originalAgregarAlCarrito === 'function') {
            window.agregarAlCarrito = function(producto) {
                // Llamar a la función original
                originalAgregarAlCarrito(producto);
                // Hacer scroll automático
                setTimeout(scrollAlCarrito, 50);
            };
        }

        // 7. Sincronizar input con display
        document.addEventListener('DOMContentLoaded', function() {
            const pagoInput = document.getElementById('pagoEfectivo');
            const pagoDisplay = document.getElementById('pagoDisplay');
            const btnCobrar = document.getElementById('pagarBtn');

            if (pagoInput) {
                pagoInput.addEventListener('input', function() {
                    const val = parseFloat(this.value) || 0;
                    pagoDisplay.textContent = `$${val.toFixed(2)}`;
                    calcularVuelto();
                });

                pagoInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        if (btnCobrar) btnCobrar.click();
                    }
                });

                // Enfocar el input al cargar para poder escribir directamente
                setTimeout(() => {
                    pagoInput.focus();
                }, 300);
            }

            // Actualizar estado de caja
            if (typeof cargarEstadoCaja === 'function') {
                cargarEstadoCaja();
            }
        });

        // 8. Función para cargar estado de caja
        async function cargarEstadoCaja() {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('https://lumire-erp-backend.onrender.com/api/caja/estado', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const infoEl = document.getElementById('cajaInfo');
                if (data.estado === 'abierta') {
                    infoEl.textContent = 'Caja: Abierta ✅';
                    infoEl.style.color = 'var(--success)';
                } else {
                    infoEl.textContent = 'Caja: Cerrada ❌';
                    infoEl.style.color = 'var(--danger)';
                }
            } catch (e) {
                console.log('Error cargando estado de caja:', e);
            }
        }

        // 9. Sobrescribir actualizarCarrito para actualizar vuelto y contador
        const originalActualizarCarrito = window.actualizarCarrito;
        window.actualizarCarrito = function() {
            if (typeof originalActualizarCarrito === 'function') {
                originalActualizarCarrito();
            }
            // Actualizar contador
            const countEl = document.getElementById('carritoCount');
            if (countEl && typeof carrito !== 'undefined') {
                countEl.textContent = carrito.length;
            }
            setTimeout(calcularVuelto, 50);
        };

        // 10. Si el usuario toca el campo de pago, seleccionar todo para escribir rápido
        document.addEventListener('DOMContentLoaded', function() {
            const pagoInput = document.getElementById('pagoEfectivo');
            if (pagoInput) {
                pagoInput.addEventListener('focus', function() {
                    this.select();
                });
            }
        });
    </script>
</body>
</html>
