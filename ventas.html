    <script>
        // ============================================
        // FUNCIÓN PARA REGISTRAR MOVIMIENTO EN CAJA
        // ============================================
        async function registrarMovimientoCaja(ventaId, total, concepto) {
            try {
                await fetch('https://lumire-erp-backend.onrender.com/api/caja/movimiento-venta', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        venta_id: ventaId,
                        total: total,
                        concepto: concepto || `Venta #${ventaId}`
                    })
                });
                // No mostramos error al usuario, solo se registra en segundo plano
            } catch (e) {
                console.log('Caja no registró movimiento:', e);
            }
        }

    <script>
    // ============================================
    // INTERFAZ DE CAJA REGISTRADORA VIRTUAL
    // ============================================
    function agregarProductoAlCarrito(nombre, precio) {
        // Función que se llama al hacer clic en un producto
        // Agrega el producto al carrito (debes adaptarlo a tu lógica existente)
        alert(`Producto agregado: ${nombre} - $${precio}`);
        // Aquí deberías llamar a tu función agregarAlCarrito() de app.js
        // Por ejemplo: agregarAlCarrito({nombre: nombre, precio_venta: precio, id: 1});
    }

    function agregarMontoPago(monto) {
        // Función para los botones de billetes predefinidos
        let pagoInput = document.getElementById('pagoEfectivo');
        if (pagoInput) {
            let valorActual = parseFloat(pagoInput.value) || 0;
            pagoInput.value = (valorActual + monto).toFixed(2);
            calcularVuelto();
        }
    }

    function limpiarPago() {
        document.getElementById('pagoEfectivo').value = '';
        document.getElementById('vueltoCliente').textContent = '$0.00';
    }

    function calcularVuelto() {
        // Calcula el vuelto automáticamente al escribir en el campo de pago
        let pagoInput = document.getElementById('pagoEfectivo');
        let vueltoSpan = document.getElementById('vueltoCliente');
        // Obtén el total del carrito (debes obtenerlo de tu variable global)
        // Por ahora, usamos un valor de ejemplo
        let totalCarrito = 120; // Reemplaza esto con la variable de tu carrito
        let pago = parseFloat(pagoInput.value) || 0;
        let vuelto = pago - totalCarrito;
        vueltoSpan.textContent = `$${vuelto >= 0 ? vuelto.toFixed(2) : '0.00'}`;
        vueltoSpan.style.color = vuelto >= 0 ? 'var(--success)' : 'var(--danger)';
    }
</script>
<!-- Interfaz de Caja Registradora -->
<div class="caja-registradora" style="border-top: 1px solid var(--border-color); margin-top: 20px; padding-top: 20px;">

    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;">
        <!-- Botones de billetes predefinidos -->
        <button class="btn-caja-billete" onclick="agregarMontoPago(500)">$500</button>
        <button class="btn-caja-billete" onclick="agregarMontoPago(200)">$200</button>
