<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LUMIRE ERP - Configuración</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .config-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }
        .config-section h3 {
            margin-bottom: 16px;
            color: var(--text-secondary);
        }
        .qr-container {
            text-align: center;
            padding: 16px;
            background: white;
            border-radius: var(--radius-sm);
            display: inline-block;
            width: 100%;
        }
        .qr-container img {
            max-width: 200px;
        }
        .codigo-input {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .codigo-input input {
            max-width: 200px;
            padding: 10px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 1em;
        }
        .btn-2fa {
            background: var(--success);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-2fa:hover { opacity: 0.8; }
        .btn-2fa.activo { background: var(--danger); }
        .btn-2fa.activo:hover { opacity: 0.8; }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .status-badge.activo { background: var(--success); color: white; }
        .status-badge.inactivo { background: var(--danger); color: white; }
        .gestor-2fa {
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            padding: 20px;
            margin-top: 16px;
        }
        .gestor-2fa .codigo-generado {
            font-size: 2.5em;
            font-weight: 700;
            text-align: center;
            color: var(--accent-cyan);
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
        }
        .gestor-2fa .tiempo-restante {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9em;
            margin-top: 8px;
        }
        .gestor-2fa .clave-secreta {
            background: var(--bg-card);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-family: 'Courier New', monospace;
            word-break: break-all;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            margin: 12px 0;
        }
        .gestor-2fa .campo-pegar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .gestor-2fa .campo-pegar input {
            flex: 1;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            min-width: 200px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">LUMIRE <span>ERP</span></div>
            <nav>
                <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Panel de Control</a>
                <a href="ventas.html"><i class="fas fa-cash-register"></i> Punto de Venta</a>
                <a href="productos.html"><i class="fas fa-boxes"></i> Productos</a>
                <a href="recetas.html"><i class="fas fa-utensils"></i> Recetas</a>
                <a href="inventario.html"><i class="fas fa-warehouse"></i> Inventario</a>
                <a href="nomina.html"><i class="fas fa-coins"></i> Nómina</a>
                <a href="usuarios.html"><i class="fas fa-users"></i> Usuarios</a>
                <a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a>
                <a href="#" id="logoutBtn" class="logout"><i class="fas fa-sign-out-alt"></i> Salir</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1><i class="fas fa-cog" style="color: var(--accent-purple);"></i> Configuración</h1>
                <div class="user-info">
                    <div class="avatar">A</div>
                </div>
            </div>

            <!-- Sección 2FA -->
            <div class="config-section">
                <h3><i class="fas fa-shield-alt" style="color: var(--accent-cyan);"></i> Verificación en Dos Pasos (2FA)</h3>
                <div id="status2fa">
                    <p style="color: var(--text-secondary);">Cargando estado...</p>
                </div>

                <!-- Gestor 2FA (se muestra al activar) -->
                <div id="gestor2fa" style="display: none;">
                    <div class="gestor-2fa">
                        <h4 style="color: var(--text-secondary); margin-bottom: 12px;">
                            <i class="fas fa-qrcode"></i> Autenticador LUMIRE
                        </h4>
                        <div id="qrContainer" class="qr-container"></div>
                        
                        <div style="margin: 16px 0;">
                            <label style="color: var(--text-secondary); font-size: 0.85em;">Clave secreta (copia este código):</label>
                            <div class="clave-secreta" id="claveSecreta">Cargando...</div>
                        </div>

                        <div style="margin: 16px 0;">
                            <label style="color: var(--text-secondary); font-size: 0.85em;">Pega la clave secreta aquí para generar el código:</label>
                            <div class="campo-pegar">
                                <input type="text" id="inputClave" placeholder="JBSWY3DPEHPK3PXP...">
                                <button class="btn-2fa" id="btnGenerarCodigo">Generar Código</button>
                            </div>
                        </div>

                        <div id="codigoGeneradoContainer" style="display: none;">
                            <div class="codigo-generado" id="codigoGenerado">------</div>
                            <div class="tiempo-restante">
                                Expira en: <span id="segundosRestantes">30</span>s
                                <span style="margin-left: 12px; display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--success);" id="indicadorTiempo"></span>
                            </div>
                        </div>

                        <div style="margin-top: 16px;">
                            <button class="btn-2fa" id="btnConfirmar2faManual">✅ Confirmar y Activar 2FA</button>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 12px;">
                    <button class="btn-2fa" id="btnActivar2fa">Activar 2FA</button>
                    <button class="btn-2fa activo" id="btnDesactivar2fa" style="display: none;">Desactivar 2FA</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'https://lumire-erp-backend.onrender.com/api';
        let token = localStorage.getItem('token');
        let codigoInterval = null;
        let secretActual = null;

        // ========== CERRAR SESIÓN ==========
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        });

        // ========== VERIFICAR ESTADO 2FA ==========
        async function verificarEstado2FA() {
            try {
                const res = await fetch(`${API_URL}/usuarios/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await res.json();
                const statusDiv = document.getElementById('status2fa');
                if (user['2fa_habilitado']) {
                    statusDiv.innerHTML = `
                        <p style="color: var(--text-secondary);">
                            Estado: <span class="status-badge activo">ACTIVO</span>
                            <span style="margin-left: 16px; font-size: 0.9em;">
                                Última verificación: ${user.ultima_verificacion_2fa ? new Date(user.ultima_verificacion_2fa).toLocaleString() : 'Nunca'}
                            </span>
                        </p>
                    `;
                    document.getElementById('btnActivar2fa').style.display = 'none';
                    document.getElementById('btnDesactivar2fa').style.display = 'inline-block';
                    document.getElementById('gestor2fa').style.display = 'none';
                } else {
                    statusDiv.innerHTML = `
                        <p style="color: var(--text-secondary);">
                            Estado: <span class="status-badge inactivo">INACTIVO</span>
                            <span style="margin-left: 16px; font-size: 0.9em;">La verificación en dos pasos no está activa.</span>
                        </p>
                    `;
                    document.getElementById('btnActivar2fa').style.display = 'inline-block';
                    document.getElementById('btnDesactivar2fa').style.display = 'none';
                    document.getElementById('gestor2fa').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('status2fa').innerHTML = '<p style="color: var(--danger);">Error al cargar el estado</p>';
            }
        }

        // ========== GENERAR TOTP EN JAVASCRIPT (SIN INTERNET) ==========
        function base32Decode(str) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            const bytes = [];
            let bits = 0;
            let value = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str[i].toUpperCase();
                const index = alphabet.indexOf(char);
                if (index === -1) continue;
                value = (value << 5) | index;
                bits += 5;
                if (bits >= 8) {
                    bytes.push((value >> (bits - 8)) & 0xFF);
                    bits -= 8;
                }
            }
            return new Uint8Array(bytes);
        }

        function generateTOTP(secret) {
            try {
                const key = base32Decode(secret);
                const timeStep = Math.floor(Date.now() / 30000);
                const timeBuffer = new ArrayBuffer(8);
                const view = new DataView(timeBuffer);
                view.setBigUint64(0, BigInt(timeStep), false);

                // Usar CryptoJS para HMAC-SHA1
                const hmac = CryptoJS.HmacSHA1(
                    CryptoJS.lib.WordArray.create(new Uint8Array(timeBuffer)),
                    CryptoJS.lib.WordArray.create(key)
                );
                const hmacBytes = new Uint8Array(hmac.words.length * 4);
                for (let i = 0; i < hmac.words.length; i++) {
                    const word = hmac.words[i];
                    hmacBytes[i * 4] = (word >> 24) & 0xFF;
                    hmacBytes[i * 4 + 1] = (word >> 16) & 0xFF;
                    hmacBytes[i * 4 + 2] = (word >> 8) & 0xFF;
                    hmacBytes[i * 4 + 3] = word & 0xFF;
                }

                const offset = hmacBytes[hmacBytes.length - 1] & 0xF;
                const binary = ((hmacBytes[offset] & 0x7F) << 24) |
                               ((hmacBytes[offset + 1] & 0xFF) << 16) |
                               ((hmacBytes[offset + 2] & 0xFF) << 8) |
                               (hmacBytes[offset + 3] & 0xFF);
                const otp = binary % 1000000;
                return otp.toString().padStart(6, '0');
            } catch (e) {
                console.error('Error generando TOTP:', e);
                return '------';
            }
        }

        function generarYMostrarCodigo() {
            const clave = document.getElementById('inputClave').value.trim().toUpperCase();
            if (!clave || clave.length < 16) {
                alert('Pega una clave secreta válida (mínimo 16 caracteres)');
                return;
            }
            secretActual = clave;
            const codigo = generateTOTP(clave);
            document.getElementById('codigoGenerado').textContent = codigo;
            document.getElementById('codigoGeneradoContainer').style.display = 'block';
            actualizarTiempo();
            if (codigoInterval) clearInterval(codigoInterval);
            codigoInterval = setInterval(() => {
                const nuevoCodigo = generateTOTP(secretActual);
                document.getElementById('codigoGenerado').textContent = nuevoCodigo;
                actualizarTiempo();
            }, 1000);
        }

        function actualizarTiempo() {
            const segundos = 30 - (Math.floor(Date.now() / 1000) % 30);
            document.getElementById('segundosRestantes').textContent = segundos;
            const indicador = document.getElementById('indicadorTiempo');
            if (segundos < 5) {
                indicador.style.background = 'var(--danger)';
            } else {
                indicador.style.background = 'var(--success)';
            }
        }

        // ========== ACTIVAR 2FA ==========
        document.getElementById('btnActivar2fa')?.addEventListener('click', async function() {
            try {
                const res = await fetch(`${API_URL}/auth/enable-2fa`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await res.json();
                if (res.ok) {
                    secretActual = data.secret;
                    document.getElementById('claveSecreta').textContent = data.secret;
                    document.getElementById('inputClave').value = data.secret;
                    const container = document.getElementById('qrContainer');
                    container.innerHTML = `
                        <p style="color: var(--text-secondary); margin-bottom: 8px;">Código QR (opcional):</p>
                        <img src="data:image/png;base64,${data.qr_base64}" alt="Código QR" style="max-width: 200px;">
                    `;
                    document.getElementById('gestor2fa').style.display = 'block';
                    document.getElementById('btnActivar2fa').style.display = 'none';
                    this.textContent = 'Activando...';
                    this.disabled = true;
                    
                    // Generar el código automáticamente al cargar
                    setTimeout(() => generarYMostrarCodigo(), 500);
                } else {
                    alert('Error: ' + (data.detail || 'No se pudo activar 2FA'));
                }
            } catch (e) {
                alert('Error de conexión: ' + e.message);
            }
        });

        // ========== GENERAR CÓDIGO MANUAL ==========
        document.getElementById('btnGenerarCodigo')?.addEventListener('click', generarYMostrarCodigo);

        // ========== CONFIRMAR Y ACTIVAR 2FA ==========
        document.getElementById('btnConfirmar2faManual')?.addEventListener('click', async function() {
            const codigo = document.getElementById('codigoGenerado').textContent;
            if (!codigo || codigo === '------') {
                alert('Primero genera un código válido');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/confirm-2fa`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ codigo })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('✅ 2FA activado correctamente');
                    document.getElementById('gestor2fa').style.display = 'none';
                    document.getElementById('btnActivar2fa').style.display = 'none';
                    document.getElementById('btnDesactivar2fa').style.display = 'inline-block';
                    if (codigoInterval) clearInterval(codigoInterval);
                    verificarEstado2FA();
                } else {
                    alert('❌ Error: ' + (data.detail || 'Código inválido'));
                }
            } catch (e) {
                alert('Error de conexión: ' + e.message);
            }
        });

        // ========== DESACTIVAR 2FA ==========
        document.getElementById('btnDesactivar2fa')?.addEventListener('click', async function() {
            if (!confirm('¿Desactivar la verificación en dos pasos?')) return;

            try {
                const res = await fetch(`${API_URL}/auth/disable-2fa`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.ok) {
                    alert('2FA desactivado');
                    if (codigoInterval) clearInterval(codigoInterval);
                    verificarEstado2FA();
                } else {
                    const error = await res.json();
                    alert('Error: ' + JSON.stringify(error));
                }
            } catch (e) {
                alert('Error de conexión');
            }
        });

        // ========== INICIAR ==========
        verificarEstado2FA();
    </script>
    <!-- Cargar CryptoJS para HMAC -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</body>
</html>
