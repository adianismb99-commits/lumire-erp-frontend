<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIRE ERP - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h2>LUMIRE ERP</h2>
            <nav>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="ventas.html">💰 Punto de Venta</a>
                <a href="productos.html">📦 Productos</a>
                <a href="#" id="logoutBtn" style="background:#e53e3e;">🚪 Salir</a>
            </nav>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <h1>Dashboard</h1>
            </div>
            <div id="dashboardContent">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                    <div style="background: white; padding: 20px; border-radius: 10px;">
                        <h3>Productos</h3>
                        <p id="totalProductos" style="font-size: 2em;">0</p>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 10px;">
                        <h3>Ventas Totales</h3>
                        <p id="totalVentas" style="font-size: 2em;">$0</p>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 10px;">
                        <h3>Estado</h3>
                        <p style="color: green;">🟢 Sistema Activo</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
